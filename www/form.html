<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Регистрация в спортзале</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Регистрация в спортзале</h1>
    
    <form id="gymForm">
        <div>
            <label>ФИО клиента:</label>
            <input type="text" name="username" placeholder="Введите имя" required>
        </div><br>

        <div>
            <label>Дата рождения:</label>
            <input type="date" name="birthDate" required>
        </div><br>
        
        <div>
            <label>Выберите абонемент:</label>
            <select name="tariff">
                <option value="1 месяц">Новичок (1 месяц)</option>
                <option value="6 месяцев">Любитель (6 месяцев)</option>
                <option value="1 год">Про (1 год)</option>
            </select>
        </div><br>

        <div>
            <label>Удобное время посещения:</label><br>
            <input type="radio" name="visitTime" value="Утро" checked> Утро<br>
            <input type="radio" name="visitTime" value="День"> День<br>
            <input type="radio" name="visitTime" value="Вечер"> Вечер
        </div><br>

        <div>
            <input type="checkbox" name="personalTrainer" id="trainer">
            <label for="trainer">Нужен тренер</label>
        </div><br>

        <button type="submit">Зарегистрироваться</button>
    </form>

    <div id="result"></div>

    <script>
        let inactivityTimer;

        function resetTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                alert("Пожалуйста, заполните форму! Мы ждем ваши данные.");
            }, 15000); 
        }

        document.getElementById("gymForm").addEventListener("keypress", resetTimer);
        document.getElementById("gymForm").addEventListener("mousemove", resetTimer);
        resetTimer(); 

        document.getElementById("gymForm").addEventListener("submit", function(e) {
            e.preventDefault();
            clearTimeout(inactivityTimer); 
            
            const formData = new FormData(this);
            const resultDiv = document.getElementById("result");
            
            const labels = {
                username: "ФИО",
                birthDate: "Дата рождения",
                tariff: "Тариф",
                visitTime: "Время",
                personalTrainer: "Тренер"
            };

            let output = "<h3>✅ Регистрация завершена</h3>";

            for (const [name, value] of formData.entries()) {
                let humanName = labels[name] || name;
                let humanValue = value === 'on' ? 'Да' : value;
                output += `<p><b>${humanName}:</b> ${humanValue}</p>`;
            }

            if (!formData.has('personalTrainer')) {
                output += `<p><b>Тренер:</b> Нет</p>`;
            }
            
            resultDiv.innerHTML = output;
            resultDiv.style.display = "block";
            resultDiv.style.marginTop = "20px";
            resultDiv.style.padding = "15px";
            resultDiv.style.border = "2px solid #10b981";
            resultDiv.style.borderRadius = "8px";
            resultDiv.style.backgroundColor = "#ecfdf5";

        });
    </script>
</body>
</html>
